<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madurai Military Hotel - Restaurant Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="customer-body">
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo"><img src="/images/logo.jpg" alt="Madurai Military Hotel" style="height: 80px; border-radius: 8px;"></div>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Header -->
    <header class="customer-header">
        <div class="header-content">
            <div class="logo">
                <a href="/" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
                    <img src="/images/logo.jpg" alt="Madurai Military Hotel" style="height: 44px; border-radius: 6px; box-shadow: var(--shadow-sm);">
                    <span class="logo-text">Savoria</span>
                </a>
            </div>
            <nav class="main-nav">
                <a href="kitchen.html" class="nav-link">Kitchen</a>
                <a href="index.html" class="nav-link active">Menu</a>
                <a href="admin.html" class="nav-link">Admin</a>
            </nav>
            <div class="table-info" id="tableInfo">
                <span class="table-badge">Table <span id="tableNumber">--</span></span>
            </div>
        </div>
    </header>

    <!-- Offers Banner -->
    <section class="offers-section">
        <div class="offers-slider" id="offersSlider">
            <div class="offers-track" id="offersTrack">
                <!-- Offers will be loaded dynamically -->
            </div>
        </div>
        <div class="offers-dots" id="offersDots"></div>
    </section>

    <!-- Search & Filter -->
    <section class="search-filter-section">
        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search dishes...">
            </div>
        </div>
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="veg">
                <span class="veg-indicator"></span> Veg
            </button>
            <button class="filter-btn" data-filter="non-veg">
                <span class="non-veg-indicator"></span> Non-Veg
            </button>
            <button class="filter-btn" data-filter="spicy">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2c1.1 0 2 .9 2 2v2c3.31 0 6 2.69 6 6 0 1.85-.84 3.51-2.16 4.61L17 22H7l-.84-5.39C4.84 15.51 4 13.85 4 12c0-3.31 2.69-6 6-6V4c0-1.1.9-2 2-2z"/>
                </svg>
                Spicy
            </button>
            <div class="sort-dropdown">
                <button class="sort-btn" id="sortBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M6 12h12M9 18h6"/>
                    </svg>
                    Sort
                </button>
                <div class="sort-options" id="sortOptions">
                    <button class="sort-option" data-sort="default">Default</button>
                    <button class="sort-option" data-sort="price-low">Price: Low to High</button>
                    <button class="sort-option" data-sort="price-high">Price: High to Low</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section class="categories-section">
        <div class="categories-scroll" id="categoriesScroll">
            <!-- Categories will be loaded dynamically -->
        </div>
    </section>

    <!-- Menu Grid -->
    <main class="menu-section">
        <div class="menu-grid" id="menuGrid">
            <!-- Menu items will be loaded dynamically -->
        </div>
        <div class="menu-skeleton" id="menuSkeleton">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
    </main>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2 class="cart-title">Your Order</h2>
            <button class="cart-close" id="cartClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="cart-empty" id="cartEmpty">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <p>Your cart is empty</p>
                <span>Add some delicious items!</span>
            </div>
        </div>
        <div class="cart-footer" id="cartFooter">
            <div class="cart-subtotal">
                <span>Subtotal</span>
                <span id="cartSubtotal">₹0.00</span>
            </div>
            <div class="cart-total">
                <span>Total</span>
                <span id="cartTotal">₹0.00</span>
            </div>
            <button class="place-order-btn" id="placeOrderBtn">
                <span>Place Order</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </aside>

    <!-- Floating Cart Button -->
    <button class="floating-cart" id="floatingCart">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
    </button>

    <!-- Success Modal -->
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-animation">
                <svg class="checkmark" viewBox="0 0 52 52">
                    <circle cx="26" cy="26" r="25" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.1;"/>
                    <path d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h2>Order Placed!</h2>
            <p>Your order has been sent to the kitchen.</p>
            <span class="order-number">Order #<span id="orderNumber">0000</span></span>
            <button class="success-btn" id="successBtn">Continue Browsing</button>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script type="module" src="firebase-service.js"></script>
    <script src="script.js"></script>
</body>
</html>
